serenity {
  project.name = "QA REST Screenplay Challenge"
}



# Environment-specific configurations, allow for different base URLs or settings for different environments 
environments {
  # qa environment settings.
  qa {
    # The base URL for API requests in the default environment.
    base.url = "https://gorest.co.in/public/v2"
    secret.key = "${?GOREST_TOKEN}"

  }
}